services:

  db:
    container_name: postgresql_db
    image: postgres:17
    restart: always 

    volumes:
      - ./data/db:/var/lib/postgresql/data

    environment:
      POSTGRES_USER: apiwebtoolUser
      POSTGRES_PASSWORD: RVomy#$@CE76#t!yNkPr
      POSTGRES_DB: ApiWebToolDB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apiwebtoolUser -d ApiWebToolDB"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    networks:
      app_net:
        ipv4_address: 192.168.0.2

  app:
    container_name: apiweb_tool
    image: lilian2016/apiwebtool:latest
    stdin_open: true
    tty: true
    restart: always
    depends_on:
      db:
        condition: service_healthy

    networks:
      app_net:
        ipv4_address: 192.168.0.3
    
networks:
  app_net:
    ipam:
      driver: default
      config:
        - subnet: "192.168.0.0/24"
          gateway: 192.168.0.1