name: '[CD] Push docker image'

on:
  workflow_dispatch: 
      
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: git checkout
        uses: actions/checkout@v4
          
      - name: Installation de Java
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin

      - name: Cache Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: 'Compilation en .jar'
        run: mvn clean package

      - name: 'Copie du projet vers build'
        run: |
          cp 'target/ApiWebTool.jar' 'build/docker/projet.jar'

      - name: Build image docker
        run: docker build ./build/docker --file ./build/docker/Dockerfile --tag apiwebtool:latest

      - name: Login into docker account
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image
        run: docker push lilian2016/apiwebtool:latest
          
